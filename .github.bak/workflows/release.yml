name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: pixcli
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: pixcli
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: pixcli
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: pixcli
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: pixcli.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }} -p pixcli -p pix-mcp -p pix-webhook-server
          else
            cargo build --release --target ${{ matrix.target }} -p pixcli -p pix-mcp -p pix-webhook-server
          fi
        shell: bash

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../pixcli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz pixcli pix-mcp pix-webhook-server
        shell: bash

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../pixcli-${{ github.ref_name }}-${{ matrix.target }}.zip pixcli.exe pix-mcp.exe pix-webhook-server.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixcli-${{ matrix.target }}
          path: pixcli-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/*
